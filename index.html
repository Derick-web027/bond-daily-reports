<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>固收日报 | Bond Daily Reports</title>
<style>
  :root {
    --clr-data: #1F4E79;
    --clr-alert: #C00000;
    --clr-head: #262626;
    --clr-mute: #7F7F7F;
    --clr-bg: #fafafa;
    --clr-card: #ffffff;
    --clr-border: #e5e5e5;
    --clr-accent: #1F4E79;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--clr-bg);
    color: #333;
    margin: 0;
    padding: 32px 16px;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    padding: 32px 24px;
    background: white;
    border: 1px solid var(--clr-border);
    border-radius: 8px;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 28px;
    color: var(--clr-head);
    margin: 0 0 8px 0;
  }
  .header p {
    color: var(--clr-mute);
    font-size: 14px;
    margin: 4px 0;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--clr-mute);
  }
  .stats span strong {
    color: var(--clr-data);
    font-size: 16px;
  }
  .report-list {
    background: white;
    border: 1px solid var(--clr-border);
    border-radius: 8px;
    overflow: hidden;
  }
  .report-item {
    display: flex;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 1px solid var(--clr-border);
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
  }
  .report-item:hover {
    background: #f5f8fc;
  }
  .report-item:last-child {
    border-bottom: none;
  }
  .report-date {
    font-size: 14px;
    color: var(--clr-mute);
    margin-right: 20px;
    min-width: 100px;
    font-family: "SF Mono", Monaco, Consolas, monospace;
  }
  .report-title {
    flex: 1;
    font-size: 15px;
    color: var(--clr-head);
    font-weight: 500;
  }
  .report-arrow {
    color: var(--clr-mute);
    font-size: 14px;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    color: var(--clr-mute);
    font-size: 13px;
  }
  .footer a {
    color: var(--clr-data);
    text-decoration: none;
  }
  @media (max-width: 640px) {
    body { padding: 16px 8px; }
    .header { padding: 24px 16px; }
    .header h1 { font-size: 22px; }
    .report-item { padding: 14px 16px; flex-wrap: wrap; }
    .report-date { min-width: 100%; margin-bottom: 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 固收市场日报</h1>
    <p>Bond Daily Reports · 买方信用策略视角</p>
    <div class="stats">
      <span><strong id="count">-</strong> 期</span>
      <span>最新: <strong id="latest">-</strong></span>
    </div>
  </div>

  <div class="report-list" id="report-list">
    <!-- 由JS渲染 -->
  </div>

  <div class="footer">
    <p>仅供内部参考 · <a href="https://github.com/Derick-web027/bond-daily-reports">GitHub</a></p>
  </div>
</div>

<script>
// 日报清单（新增日报时手动在这里追加一条）
const reports = [
  {
    date: "2026-04-16",
    title: "低等级下沉空间至极值，AAA短端始现修复",
    file: "reports/20260416.html"
  }
];

// 按日期倒序排列
reports.sort((a, b) => b.date.localeCompare(a.date));

const list = document.getElementById("report-list");
list.innerHTML = reports.map(r => `
  <a href="${r.file}" class="report-item">
    <span class="report-date">${r.date}</span>
    <span class="report-title">${r.title}</span>
    <span class="report-arrow">→</span>
  </a>
`).join("");

document.getElementById("count").textContent = reports.length;
document.getElementById("latest").textContent = reports[0]?.date || "-";
</script>
</body>
</html>
